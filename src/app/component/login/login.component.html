<div class="container-fluid bg-light">
    <div class="form-parent">
        <div class="form-signin">
            <form (ngSubmit)="onSubmit()" novalidate [formGroup]="loginForm">
                <h2 class="mb-4 fw-normal">Iniciar sesión</h2>
                <p>Ingresa tu usuario y contraseña para iniciar sesión.</p>
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" formControlName="email" id="floatingInput"
                        placeholder="name@example.com">
                    <label for="floatingInput">Correo electrónico</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="floatingPassword" formControlName="password"
                        placeholder="Password">
                    <label for="floatingPassword">Contraseña</label>
                </div>

                <div class="checkbox mb-3 text-start">
                    <label>
                        <input type="checkbox" value="remember-me" formControlName="rememberMe"> Recuérdame
                    </label>
                </div>

                <p class="text-danger" *ngIf="failedLogin">Correo o contraseña incorrecta</p>

                <button class="w-100 btn btn-primary" [disabled]="!loginForm.valid" gtagEvent trackOn="click"
                    action="login" type="submit">Iniciar sesión
                </button>

                <asl-google-signin-button class="w-100" text="continue_with" type="standard"
                    size="large"></asl-google-signin-button>
                <div class="my-3">
                    <a [routerLink]="['/registrate']" class="btn btn-link text-decoration-none" gtagEvent
                        trackOn="click" action="register">
                        ¿No tienes cuenta? <b>Regístrate</b>
                    </a>
                    <button class="btn btn-link text-decoration-none" (click)="restorePassword()" gtagEvent
                        trackOn="click" action="restore_password" type="button">Olvidé mi contraseña
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
